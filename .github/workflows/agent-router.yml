name: Agent Router

# Delegates to the reusable workflow in groundnuty/macf-actions@v1.3.0
# (see https://github.com/groundnuty/macf-actions for source).
#
# Pinned to immutable v1.3.0 rather than the floating @v1 tag so the
# routing infrastructure macf itself depends on doesn't move without
# an explicit PR here. When macf-actions cuts a new release, upgrade
# the `uses:` ref by a dedicated PR on this repo — that gives the
# upgrade its own review+verify window.

on:
  issues:
    types: [labeled, closed]
  issue_comment:
    types: [created]
  pull_request:
    types: [opened]
  pull_request_review:
    types: [submitted]
  # CI-completion routing (macf-actions#6, v1.3+). Fires the
  # route-by-ci-completion job so agent-authored PRs get notified
  # when CI finishes, eliminating the "post handoff + poll" pattern.
  check_suite:
    types: [completed]

# Caller must grant at least what the reusable workflow expects.
# `checks: read` is required for the CI-completion job to enumerate
# check_runs (for the first-failing-check name) — without it the job
# would 403 inside the reusable workflow.
permissions:
  contents: read
  issues: write
  pull-requests: read
  checks: read

jobs:
  route:
    uses: groundnuty/macf-actions/.github/workflows/agent-router.yml@v1.3.0
    secrets: inherit
