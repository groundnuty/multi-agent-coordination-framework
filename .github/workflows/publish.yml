# Publish workflow for the three MACF npm packages.
#
# Operator prerequisites (required before the first `v*` tag push; set
# up once, then forgotten). See DR-022 for background:
#
#   1. `groundnuty` user or org exists on npmjs.com owning the
#      `@groundnuty/*` scope. (In practice: the existing `groundnuty`
#      user account's personal scope — no org created, per science-
#      agent's 2026-04-22 operator-prereq note on #206.)
#
#   2. One of two authentication paths configured:
#      a) OIDC trusted publisher on EACH of the three packages'
#         npmjs.com settings pages pointing at this repo + this
#         workflow file. Preferred; gives provenance attestations.
#         Only available AFTER each package exists on npm (chicken-
#         and-egg), so the bootstrap publish uses path (b).
#      b) `NPM_TOKEN` granular access token scoped to `@groundnuty/*`
#         with publish permission, provisioned as a repo secret.
#         Works for the bootstrap publish + as a fallback if OIDC
#         breaks.
#
#   3. TODO(operator): enable 2FA on the groundnuty npm account once
#      initial publishes settle (currently deferred per #206 operator
#      note). Add the `publish` 2FA level at the account level and
#      `auth-and-writes` for granular tokens. Doesn't require a
#      workflow change — but the existing `NPM_TOKEN` will need
#      regenerating as an `auth-and-writes` token when flipped.
#
# Publish ordering:
#
#   core first, then consumers (CLI + channel-server). Consumer
#   tarballs reference `@groundnuty/macf-core@<version>` as a
#   concrete dep, so core MUST be live on npm before a consumer can
#   install cleanly. Sequential steps gate this — a failed core step
#   prevents consumer publishes, avoiding half-published releases.
#
# Rollback:
#
#   Within 72h of publish: `npm unpublish @groundnuty/macf-*@<version>`
#   is allowed. Past 72h: only deprecate + patch. Verification on all
#   three agent workspaces should complete within the 72h window per
#   DR-022 Amendment H.

name: Publish

on:
  push:
    tags: ['v*']
  # Manual dispatch for one-off re-runs (e.g. rotation tests, rc
  # verification). Doesn't create a tag — operator runs against the
  # current checkout. Default to dry-run for safety.
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Run npm publish --dry-run only (no actual publish)'
        required: false
        type: boolean
        default: true

# `id-token: write` is required for OIDC provenance. `contents: read`
# for the checkout. Scoped to the minimum; nothing else on the
# repo's default GITHUB_TOKEN needs write access for this workflow.
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    # Run from a tag ref only — never a branch push — as a defensive
    # layer. The on.push.tags trigger already restricts this, but
    # refs/heads/* sneaking through (e.g. via workflow_dispatch on a
    # branch) would publish from unreviewed code. Explicit guard.
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') }}

    steps:
      - uses: actions/checkout@v6

      - uses: jetify-com/devbox-install-action@v0.15.0

      - name: Derive version from tag or package.json
        id: version
        env:
          GITHUB_REF: ${{ github.ref }}
        run: |
          # Tag form: refs/tags/v0.2.0 → version 0.2.0
          # For workflow_dispatch on a branch, use package.json.
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG_VERSION="${GITHUB_REF#refs/tags/v}"
            echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"
            echo "tag_driven=true" >> "$GITHUB_OUTPUT"
          else
            PKG_VERSION=$(node -p "require('./packages/macf-core/package.json').version")
            echo "version=$PKG_VERSION" >> "$GITHUB_OUTPUT"
            echo "tag_driven=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check package.json versions match the tag
        if: steps.version.outputs.tag_driven == 'true'
        env:
          EXPECTED: ${{ steps.version.outputs.version }}
        run: |
          # Lock-step per DR-022 Amendment D — all three packages
          # publish at the same version. Fail loud if any package.json
          # drifts from the tag version before a single publish runs.
          set -e
          for pkg in macf-core macf macf-channel-server; do
            ACTUAL=$(node -p "require('./packages/${pkg}/package.json').version")
            if [[ "$ACTUAL" != "$EXPECTED" ]]; then
              echo "::error::packages/${pkg}/package.json version=${ACTUAL} doesn't match tag v${EXPECTED}"
              exit 1
            fi
          done
          echo "All three packages at v${EXPECTED}, matches tag."

      # Sigstore's transparency log is append-only; once an entry is
      # submitted, retrying the same tarball content gets 409
      # TLOG_CREATE_ENTRY_ERROR. A prior partially-failed publish run
      # can leave one or two packages on npm at the target version
      # while a third never made it (the third's TLOG entry was
      # registered, but the npm publish failed downstream). Retrying
      # the same tag THEN trips the 409 on the previously-failed
      # package — producing a structurally broken split-publish.
      # Catch this BEFORE any publish step runs: query npm for each
      # package's current latest version; if any matches the target,
      # fail loud and require a human to bump + retag. Recovery
      # procedure documented in DR-022 Amendment L. Witness incident:
      # v0.2.25 -> v0.2.26 cycle on 2026-05-18 (macf#377).
      # Skipped on dry-run (no real publish happens; pre-flight check
      # would block valid dry-run iteration on existing versions).
      - name: Pre-flight registry collision check (sigstore TLOG race defense)
        if: steps.version.outputs.tag_driven == 'true' && github.event.inputs.dry-run != 'true'
        env:
          EXPECTED: ${{ steps.version.outputs.version }}
        run: |
          set -e
          ANY_COLLISION=0
          for pkg in macf-core macf macf-channel-server; do
            FULL="@groundnuty/${pkg}"
            URL="https://registry.npmjs.org/${FULL}"
            CURRENT=""
            for try in 1 2 3; do
              if META=$(curl -sfL "$URL" 2>/dev/null); then
                CURRENT=$(echo "$META" | jq -r '.["dist-tags"].latest // empty')
                break
              fi
              sleep 2
            done
            if [[ -z "$CURRENT" ]]; then
              echo "OK ${FULL}: never-published (no current latest)"
              continue
            fi
            if [[ "$CURRENT" == "$EXPECTED" ]]; then
              echo "::error::${FULL}@${EXPECTED} is ALREADY at the target version on npm -- refusing to retry."
              echo "::error::Likely cause: a prior publish run partially succeeded (sigstore TLOG race during retry-by-tag-recreate)."
              echo "::error::Recovery: bump all three packages to the next patch version + re-tag + push. See DR-022 Amendment L."
              ANY_COLLISION=1
            else
              echo "OK ${FULL}: current latest=${CURRENT}, target=${EXPECTED} (no collision)"
            fi
          done
          if [[ "$ANY_COLLISION" == "1" ]]; then
            exit 1
          fi
          echo "Pre-flight clean -- no version collisions; safe to publish v${EXPECTED}."

      - name: Install + check + build
        run: |
          devbox run -- npm ci
          devbox run -- make -f dev.mk check
          devbox run -- make -f dev.mk build

      # OIDC trusted publishers (npm 11.5.1+) require a newer npm than
      # devbox's nixpkgs pin currently provides (npm@10.8.3 at the
      # nodePackages.npm pin). Install npm@11.14.1 into a user-writable
      # prefix on the runner ($HOME/npm-global) and prepend to PATH;
      # devbox.json's pin stays the same so local dev is unaffected.
      #
      # Why NOT `devbox run -- npm install -g`: devbox uses Nix's
      # read-only store at /nix/store/...; npm's default global prefix
      # under Nix's nodejs hits EACCES on mkdir. The user-prefix
      # approach uses the SAME devbox npm binary as the install driver
      # but redirects the install target to a writable location.
      #
      # PINNED to a specific npm version, NOT `latest`: floating tags
      # silently break in the future when npm 12+ ships behavioral
      # changes. Bump this pin explicitly when needed. See operator
      # directive 2026-05-20 (`feedback_no_floating_tags_in_ci_pins.md`).
      - name: Upgrade npm to 11.14.1 (for OIDC trusted publisher support)
        run: |
          set -euo pipefail
          mkdir -p "$HOME/npm-global"
          devbox run -- npm config set prefix "$HOME/npm-global"
          devbox run -- npm install -g npm@11.14.1
          echo "$HOME/npm-global/bin" >> "$GITHUB_PATH"
          "$HOME/npm-global/bin/npm" --version

      - name: Detect auth path
        id: auth
        env:
          HAS_NPM_TOKEN: ${{ secrets.NPM_TOKEN != '' }}
        run: |
          # Prefer OIDC when id-token:write grants succeed (provenance
          # attestations generated by npm publish --provenance). Fall
          # back to NPM_TOKEN for the bootstrap publish (when the
          # package doesn't yet exist on npm and OIDC trust can't be
          # configured on it).
          if [[ "$HAS_NPM_TOKEN" == "true" ]]; then
            echo "npm_token_available=true" >> "$GITHUB_OUTPUT"
          else
            echo "npm_token_available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure npm auth (NPM_TOKEN path)
        if: steps.auth.outputs.npm_token_available == 'true'
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # Write the token to ~/.npmrc for the duration of the job.
          # GitHub Actions runners are ephemeral; no cleanup needed.
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" >> "$HOME/.npmrc"
          echo "registry=https://registry.npmjs.org/" >> "$HOME/.npmrc"

      # Bare `npm publish` (NOT `devbox run -- npm publish`) — uses the
      # PATH-resolved npm 11.14.1 from $HOME/npm-global/bin (installed
      # above) for OIDC trusted publisher support. devbox's pinned
      # npm@10.8.3 lacks the OIDC handshake (needs 11.5.1+).
      #
      # Workflow flag (not cwd) targets sub-packages from monorepo root.
      # `cd packages/<name>` before the command was a silent no-op
      # historically — npm packed the private monorepo-root package
      # instead of the intended sub-package, failing with EPRIVATE.
      # See v0.2.0-rc.0 failed publish run for the diagnostic.
      - name: Publish @groundnuty/macf-core (first, consumers depend on it)
        env:
          DRY_RUN: ${{ github.event.inputs.dry-run }}
        run: |
          if [[ "$DRY_RUN" == "true" ]]; then
            npm publish --workspace=@groundnuty/macf-core --provenance --access public --dry-run
          else
            npm publish --workspace=@groundnuty/macf-core --provenance --access public
          fi

      - name: Publish @groundnuty/macf (CLI)
        env:
          DRY_RUN: ${{ github.event.inputs.dry-run }}
        run: |
          if [[ "$DRY_RUN" == "true" ]]; then
            npm publish --workspace=@groundnuty/macf --provenance --access public --dry-run
          else
            npm publish --workspace=@groundnuty/macf --provenance --access public
          fi

      - name: Publish @groundnuty/macf-channel-server
        env:
          DRY_RUN: ${{ github.event.inputs.dry-run }}
        run: |
          if [[ "$DRY_RUN" == "true" ]]; then
            npm publish --workspace=@groundnuty/macf-channel-server --provenance --access public --dry-run
          else
            npm publish --workspace=@groundnuty/macf-channel-server --provenance --access public
          fi

      # Per macf#214 step 2: `npm publish --provenance` exits 0 even
      # when attestation generation silently skipped (historically
      # possible with missing `id-token: write` or wrong OIDC scope).
      # Cross-check against the registry's published metadata so that
      # class of failure surfaces as a workflow error instead of a
      # silently-broken publish.
      #
      # Skipped on dry-run (no real publish to verify) and on the
      # NPM_TOKEN bootstrap path (token-only publishes don't generate
      # provenance attestations — only OIDC publishes do; tokens are
      # the chicken-and-egg fallback before OIDC-trust can be set up).
      - name: Verify provenance attestations on published versions
        if: github.event.inputs.dry-run != 'true' && steps.auth.outputs.npm_token_available != 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -e
          # The registry serves package metadata at
          # https://registry.npmjs.org/<scope>/<name>/<version>. The
          # `dist.attestations` field is present and non-empty when
          # provenance attestations were generated by --provenance.
          # If the field is absent or empty, npm published the
          # tarball but the attestation generation silently skipped.
          for pkg in macf-core macf macf-channel-server; do
            FULL="@groundnuty/${pkg}"
            URL="https://registry.npmjs.org/${FULL}/${VERSION}"
            # Allow a few seconds for registry replication after publish.
            for try in 1 2 3 4 5; do
              if META=$(curl -sfL "$URL"); then break; fi
              sleep 3
            done
            if [[ -z "${META:-}" ]]; then
              echo "::error::Could not fetch ${URL} after 5 retries"
              exit 1
            fi
            # `attestations` is an OBJECT (not array) — check for the
            # provenance.url subfield, which is set when provenance
            # was generated. `jq -e` exits non-zero on null/missing.
            # Attestation shape (verified 2026-05-20 against the registry):
            #   dist.attestations = {
            #     url: "https://registry.npmjs.org/-/npm/v1/attestations/<scope>%2f<pkg>@<version>",
            #     provenance: { predicateType: "https://slsa.dev/provenance/v1" }
            #   }
            # Earlier version of this script checked `.dist.attestations.provenance.url`
            # which is NOT the canonical path (provenance has predicateType, not url) —
            # the URL lives at `.dist.attestations.url` top-level. Fixed 2026-05-20
            # after v0.2.32 publish succeeded but post-publish verify falsely failed.
            if ! echo "$META" | jq -e '.dist.attestations.url' >/dev/null; then
              echo "::error::${FULL}@${VERSION} published without provenance attestation"
              echo "::error::dist.attestations field: $(echo "$META" | jq -c '.dist.attestations // null')"
              exit 1
            fi
            ATT_URL=$(echo "$META" | jq -r '.dist.attestations.url')
            echo "✓ ${FULL}@${VERSION} provenance attestation present: ${ATT_URL}"
          done

      - name: Summary
        if: always()
        env:
          VERSION: ${{ steps.version.outputs.version }}
          DRY_RUN: ${{ github.event.inputs.dry-run }}
          NPM_TOKEN_AVAILABLE: ${{ steps.auth.outputs.npm_token_available }}
        run: |
          AUTH_PATH="OIDC-only"
          if [[ "$NPM_TOKEN_AVAILABLE" == "true" ]]; then
            AUTH_PATH="NPM_TOKEN + OIDC provenance"
          fi
          {
            echo "## Publish run summary"
            echo ""
            echo "- Version: \`v$VERSION\`"
            echo "- Dry run: \`$DRY_RUN\`"
            echo "- Auth path: $AUTH_PATH"
            echo ""
            echo "### Published packages (if not dry-run)"
            echo "- [@groundnuty/macf-core@$VERSION](https://www.npmjs.com/package/@groundnuty/macf-core/v/$VERSION)"
            echo "- [@groundnuty/macf@$VERSION](https://www.npmjs.com/package/@groundnuty/macf/v/$VERSION)"
            echo "- [@groundnuty/macf-channel-server@$VERSION](https://www.npmjs.com/package/@groundnuty/macf-channel-server/v/$VERSION)"
          } >> "$GITHUB_STEP_SUMMARY"
