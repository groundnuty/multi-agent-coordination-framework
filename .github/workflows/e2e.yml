name: E2E

# Post-merge + cadence E2E suite (#149). The default CI gate
# (ci.yml → `make check`) doesn't run E2E, so fixture/gate drift can
# stay silent for days — surfaced twice in one session:
#
#   - #121 landed the clientAuth EKU gate on 2026-04-17; the E2E
#     cert fixture wasn't updated, so every E2E test 403'd.
#     Invisible until PR #148 tried to add new E2E cases 3 days later.
#   - CLI-behavior changes that require a rebuild of dist/ can drift
#     silently for the same reason (#126, #144).
#
# Running E2E post-merge catches fixture/gate drift within minutes of
# landing. Daily cron catches external drift (e.g. upstream openssl
# defaults shifting). Failures auto-open an issue (or update the
# existing open one) so code-agent gets routed the breakage.
#
# Security note: all GitHub-context interpolations go through `env:`
# rather than direct `${{ ... }}` expansion inside `run:` scripts.
# Built-in `github.*` values used here are non-attacker-controlled
# (sha, run_id, event_name, repository), but the env-var pattern is
# best practice regardless — future edits that add user-controlled
# inputs (issue titles, commit messages) stay safe-by-default.

on:
  push:
    branches: [main]
    paths:
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
      - 'dev.mk'
      - 'devbox.json'
  schedule:
    # 07:00 UTC daily — off-hours vs. most commit windows, catches
    # external-drift class without racing active PR merges.
    - cron: '0 7 * * *'
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  e2e:
    runs-on: ubuntu-latest
    # Job-level env shared by auto-open + self-close steps. Both need
    # the same title-prefix string to stay in lockstep on the dedup
    # search — previously duplicated across the two `run:` blocks as
    # a literal, which would drift if one step's title updated without
    # the other. Extracted here so a single edit updates both.
    # (If a 2nd auto-opened incident class appears, promote this to a
    # reusable composite action; see memory/project_title_prefix_extraction.md.)
    env:
      INCIDENT_TITLE_PREFIX: "ci(e2e): post-merge suite failing on main"
    steps:
      - uses: actions/checkout@v6

      - uses: jetify-com/devbox-install-action@v0.15.0

      # Install node deps before running E2E. Unlike `make check` which
      # chains `install` as a prerequisite, the `test-e2e` target runs
      # vitest directly — so CI runners with empty node_modules need an
      # explicit install step. First E2E workflow run (post-#152 merge,
      # 2026-04-20) surfaced this the obvious way: vitest not found,
      # workflow failure, auto-opened #154 per design. The workflow
      # worked; the dependency was missing. Fix is the install step.
      - name: Install deps
        run: make -f dev.mk install

      - name: Run E2E suite
        run: make -f dev.mk test-e2e

      - name: Auto-open / update issue on E2E failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EVENT: ${{ github.event_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # Dedup by title prefix rather than by label — no label setup
          # required, and a human-readable title is a sharper signal
          # when scanning the issue list than a tag.
          EXISTING=$(gh issue list \
            --repo "$REPO" \
            --state open \
            --search "\"$INCIDENT_TITLE_PREFIX\" in:title" \
            --json number \
            --jq '.[0].number // ""')

          COMMENT_BODY=$(cat <<EOF
          New E2E failure detected on \`$COMMIT_SHA\` (event: \`$EVENT\`).

          Run: $RUN_URL

          @macf-code-agent[bot] — E2E suite failing on main. Investigate and fix, or file a revert if the break is urgent.
          EOF
          )

          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --repo "$REPO" --body "$COMMENT_BODY"
            echo "Updated existing issue #$EXISTING"
          else
            BODY=$(cat <<EOF
          The E2E suite (\`make -f dev.mk test-e2e\`) failed on main after the latest merge.

          Initial failure: commit \`$COMMIT_SHA\` (event: \`$EVENT\`).
          Run: $RUN_URL

          This issue is auto-opened by \`.github/workflows/e2e.yml\` (#149) and will **auto-close on the next green E2E run** via the self-close-on-green step (#163). Subsequent failures before that green run append a comment rather than opening a new issue.

          @macf-code-agent[bot] — E2E suite failing on main. Investigate and fix, or file a revert if the break is urgent.

          ---

          **Likely causes (session memory):**

          - Fixture/gate drift (E2E cert fixture out-of-sync with a new middleware, e.g. #121 EKU gate → #148 fixture update)
          - Stale \`dist/\` from CLI changes not yet rebuilt (#144 stale-dist detection covers this locally)
          - External toolchain drift (openssl defaults, Node TLS behavior, etc.)
          EOF
          )
            gh issue create \
              --repo "$REPO" \
              --title "$INCIDENT_TITLE_PREFIX — since \`$COMMIT_SHA\`" \
              --label "code-agent,blocked" \
              --body "$BODY"
          fi

      # Self-close-on-green (#163). Companion to the auto-open step
      # above: after a GREEN E2E run on main (push or schedule — both
      # indicate a genuine on-main pass), close any open auto-opened
      # issue with a comment citing the green run's SHA + URL.
      # Machine-enforces the "stays open until green" contract the
      # auto-open body sets — previously operator-disciplined and lost
      # to lucky-timing auto-close on PR merge (see #154 / #160 / #162).
      #
      # Why the event filter excludes workflow_dispatch: operators may
      # manually dispatch to investigate a suspected-flake; we don't
      # want that to close an open incident issue. push + schedule
      # cover the "main is genuinely green" signals.
      - name: Self-close auto-opened issue on green
        if: success() && (github.event_name == 'push' || github.event_name == 'schedule')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EVENT: ${{ github.event_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          EXISTING=$(gh issue list \
            --repo "$REPO" \
            --state open \
            --search "\"$INCIDENT_TITLE_PREFIX\" in:title" \
            --json number \
            --jq '.[0].number // ""')

          if [ -z "$EXISTING" ]; then
            echo "No auto-opened E2E issue open — no-op."
            exit 0
          fi

          CLOSE_BODY=$(cat <<EOF
          E2E suite GREEN on \`$COMMIT_SHA\` (event: \`$EVENT\`).

          Run: $RUN_URL

          Auto-closed by the self-close-on-green step (#163) per coordination.md Issue Lifecycle rule 5 ("wait for the next auto-run to confirm green, then close with evidence"). If the fix was incomplete, the next E2E failure re-opens via the title-prefix dedup path.
          EOF
          )

          gh issue close "$EXISTING" --repo "$REPO" --reason completed --comment "$CLOSE_BODY"
          echo "Closed issue #$EXISTING"
